<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | Maweb</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #111;
      --accent: #8b5cf6;
      --text: #f0ece4;
      --muted: #666;
      --border: #222;
      --input-bg: #0f0f0f;
      --danger: #e85a5a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 2.5rem;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
    }

    .logo span {
      color: var(--accent);
    }

    .logo p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
    }

    .login-btn:hover {
      opacity: 0.85;
    }

    .error-msg {
      background: rgba(232, 90, 90, 0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }

    .back-link a {
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.05em;
    }

    .back-link a:hover {
      color: var(--accent);
    }

    .setup-notice {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .setup-notice p {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
    }

    .setup-btn {
      display: block;
      width: 100%;
      margin-top: 1rem;
      padding: 0.6rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .setup-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <h1>Ma<span>web</span></h1>
        <p>Admin Portal</p>
      </div>

      <div class="error-msg" id="error">Incorrect password. Please try again.</div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter admin password" />
      </div>

      <button class="login-btn" onclick="login()">Sign In</button>

      <div class="back-link">
        <a href="../index.html">&larr; Back to Site</a>
      </div>

      <div class="setup-notice" id="setupNotice">
        <p>First time? Set up your admin password to get started.</p>
        <button class="setup-btn" onclick="setupPassword()">Set Up Password</button>
      </div>
    </div>
  </div>

  <script>
    // Check if password is already set
    const hasPassword = localStorage.getItem('maweb_admin_password') !== null;
    document.getElementById('setupNotice').style.display = hasPassword ? 'none' : 'block';

    // Allow Enter key to submit
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') login();
    });

    function login() {
      const password = document.getElementById('password').value;
      const storedPassword = localStorage.getItem('maweb_admin_password');

      if (password === storedPassword) {
        // Set session
        sessionStorage.setItem('maweb_admin_logged_in', 'true');
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('error').classList.add('visible');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }

    function setupPassword() {
      const password = prompt('Set your admin password:');
      if (!password || password.length < 4) {
        alert('Password must be at least 4 characters.');
        return;
      }

      const confirm = prompt('Confirm your password:');
      if (password !== confirm) {
        alert('Passwords do not match.');
        return;
      }

      localStorage.setItem('maweb_admin_password', password);
      alert('Password set! Please log in.');
      document.getElementById('setupNotice').style.display = 'none';
      document.getElementById('password').focus();
    }
  </script>
</body>
</html>
